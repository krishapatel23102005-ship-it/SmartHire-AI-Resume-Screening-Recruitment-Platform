{% extends 'analyzer/base.html' %}

{% block title %}Contact Us - ResuAI{% endblock %}

{% block content %}
<div class="auth-wrapper" style="min-height: 70vh;">
    <div class="auth-card glass-panel" style="max-width: 600px;">
        <div class="auth-header">
            <h2>Get In Touch</h2>
            <p>Have questions or feedback? Send us a message.</p>
        </div>
        
        <form class="auth-form" onsubmit="event.preventDefault(); alert('Thank you for your message! Our team will contact you shortly.'); this.reset();">
            <div class="form-group">
                <label for="contact-name"><i class="fa-solid fa-user"></i> Full Name</label>
                <input type="text" id="contact-name" placeholder="Enter your name" required class="form-control">
            </div>
            
            <div class="form-group">
                <label for="contact-email"><i class="fa-solid fa-envelope"></i> Email Address</label>
                <input type="email" id="contact-email" placeholder="Enter your email" required class="form-control">
            </div>
            
            <div class="form-group">
                <label for="contact-message"><i class="fa-solid fa-comment-dots"></i> Message</label>
                <textarea id="contact-message" placeholder="Type your message here..." rows="4" required class="form-control" style="background: rgba(255,255,255,0.04); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px 16px; font-family: var(--font-sans); resize: none;"></textarea>
            </div>
            
            <button type="submit" class="btn-primary btn-block">
                <i class="fa-solid fa-paper-plane"></i> Send Message
            </button>
        </form>
    </div>
</div>
{% endblock %}
